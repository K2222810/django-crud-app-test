{% extends 'base.html' %}

{% block content %}
<h1>All Books</h1>

{% if books %}
  <div class="card-container">
    {% for book in books %}
      <div class="card">
        <h3><a href="{% url 'book-detail' book.id %}">{{ book.title }}</a></h3>
        <p>by {{ book.author }}</p>
        <p>{{ book.pages }} pages</p>
      </div>
    {% endfor %}
  </div>
{% else %}
  <p>No books in your collection yet. <a href="{% url 'book-create' %}">Add one now!</a></p>
{% endif %}
{% endblock %}
