{% extends 'base.html' %}
{% block content %}
  <h1>Book List</h1>
  <ul>
    {% for book in object_list %}
      <li>
        <a href="{% url 'book-detail' book.pk %}">{{ book.title }}</a> by {{ book.author }}
      </li>
    {% empty %}
      <li>No books found.</li>
    {% endfor %}
  </ul>
{% endblock %}
